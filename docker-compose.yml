x-backend-env: &backend-env
  APP_ENV: dev
  APP_DEBUG: 1
  APP_SECRET: ${APP_SECRET:-change_me_generate_with_openssl_rand_hex_16}
  DEFAULT_URI: http://backend:8000
  DB_HOST: db
  DB_PORT: 5432
  DB_NAME: app_db
  DB_USER: postgres
  DB_PASSWORD: 123456
  WORKFLOW_MAIL_FROM: noreply@localhost
  WORKFLOW_EMAIL_WEBHOOK_URL: http://host.docker.internal:5678/webhook/send-email
  WORKFLOW_SMS_WEBHOOK_URL: http://host.docker.internal:5678/webhook/send-sms
  WORKFLOW_SMS_DEFAULT_TO: ""
  MESSENGER_TRANSPORT_DSN: doctrine://default?auto_setup=0

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    environment: *backend-env
    ports:
      - "5679:8000"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh /app/scripts/start-backend.sh

  messenger-worker:
    build:
      context: .
    restart: unless-stopped
    working_dir: /app
    volumes:
      - .:/app
    environment: *backend-env
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh /app/scripts/start-worker.sh

volumes:
  db_data:
